name: Report Ω test result
description: Report an Ω structural concentration test result, including null results.
title: "[Result]: "
labels:
  - result
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report an Ω structural concentration test result.
        Null results are valid and useful.
  - type: input
    id: domain
    attributes:
      label: Domain
      description: Example: finance, power, climate, biology, network, custom.
    validations:
      required: true
  - type: textarea
    id: data-source
    attributes:
      label: Data source
      description: Describe the dataset, date range, and source link if public.
    validations:
      required: true
  - type: textarea
    id: omega-definition
    attributes:
      label: Ω definition
      description: State how Ω was computed, including I and G if applicable.
    validations:
      required: true
  - type: textarea
    id: event-definition
    attributes:
      label: Event definition
      description: State the event rule. It should be independent from Ω.
    validations:
      required: true
  - type: input
    id: high-omega-threshold
    attributes:
      label: High-Ω threshold
      description: Example: top 1%, q(0.99), top 10%, fixed threshold.
    validations:
      required: true
  - type: input
    id: p-event-high-omega
    attributes:
      label: P(event | high Ω)
      description: Report the conditional event probability in high-Ω states.
    validations:
      required: true
  - type: input
    id: baseline-p-event
    attributes:
      label: Baseline P(event)
      description: Report the baseline event probability.
    validations:
      required: true
  - type: input
    id: ratio
    attributes:
      label: Ratio
      description: Example: P(event | high Ω) / baseline P(event).
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes / null result allowed
      description: Add interpretation notes, limitations, or state that this is a null result.
    validations:
      required: true
