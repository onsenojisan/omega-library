name: Report reproducibility issue
description: Report a Colab, notebook, data, link, or execution error.
title: "[Reproducibility]: "
labels:
  - reproducibility
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report a problem with Colab, notebooks, data, links, or execution.
  - type: textarea
    id: what-did-you-try
    attributes:
      label: What did you try?
      description: Describe the steps you ran.
    validations:
      required: true
  - type: input
    id: link-or-notebook
    attributes:
      label: Which link or notebook?
      description: Paste the URL or notebook path.
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the failure or unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: error-message-or-screenshot
    attributes:
      label: Error message or screenshot
      description: Paste the error message, traceback, or attach a screenshot.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment, if relevant
      description: Browser, Colab runtime, Python version, OS, or other details.
    validations:
      required: false
